# ================================================
#  SAFEPASS - APPLICATION PROPERTIES
#  Desenvolvimento Local
#  As variaveis sensiveis sao lidas do arquivo .env
# ================================================

# ----------------
# APLICACAO
# ----------------
spring.application.name=SafePass
server.port=${SERVER_PORT:8080}

# URLs base
app.base-url=${APP_BASE_URL}
app.frontend.url=${APP_FRONTEND_URL}

# ----------------
# BANCO DE DADOS - MySQL
# ----------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexoes (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ----------------
# JPA / HIBERNATE
# ----------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ----------------
# JWT
# ----------------
jwt.secret=${JWT_SECRET}
app.jwt-expiration-ms=${JWT_EXPIRATION_MS:604800000}

# ----------------
# GOOGLE OAUTH2
# ----------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# ----------------
# EMAIL (Gmail SMTP)
# ----------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ----------------
# UPLOAD DE ARQUIVOS
# ----------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ----------------
# SWAGGER / SPRINGDOC
# ----------------
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method

# ----------------
# CACHE (Spring Cache simples, sem Redis)
# ----------------
spring.cache.type=simple

# ----------------
# LOGS
# ----------------
logging.level.root=INFO
logging.level.com.SafePass=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ----------------
# CORS (configurar no SecurityConfig, mas referencia aqui)
# ----------------
app.cors.allowed-origins=${APP_FRONTEND_URL}